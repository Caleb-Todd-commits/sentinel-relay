name: Bug Report
description: Report broken behavior or demo instability.
title: "[Bug] "
labels: ["type:bug", "status:ready"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Demo Impact
      description: Does this affect the final demo path?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, branch, command used
  - type: textarea
    id: notes
    attributes:
      label: Notes / Logs
      description: Paste safe logs only. Do not include secrets.
